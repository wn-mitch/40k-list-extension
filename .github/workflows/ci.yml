name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # `npm ci` runs the extension's postinstall (`wxt prepare`), which the
      # typecheck step also re-runs before `tsc`.
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
